<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Dofus — Duo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-400: #378ADD; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
    --pink-50: #FBEAF0; --pink-100: #F4C0D1; --pink-400: #D4537E; --pink-600: #993556; --pink-800: #72243E; --pink-900: #4B1528;
    --amber-400: #EF9F27; --amber-800: #633806;
    --glass-bg: rgba(255,255,255,0.32);
    --glass-border: rgba(255,255,255,0.45);
    --text-main: #2C2C2A;
    --text-soft: #5F5E5A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: var(--text-main);
    background: linear-gradient(160deg, #ffe3ef 0%, #f3e8ff 40%, #dceeff 75%, #ffe9f5 100%);
    background-attachment: fixed;
  }
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(60px); z-index: 0; opacity: 0.55; pointer-events: none; }
  .blob1 { width: 420px; height: 420px; background: #E7A9E0; top: -120px; left: -100px; }
  .blob2 { width: 380px; height: 380px; background: #F7B3CE; bottom: -100px; right: -80px; }
  .wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 24px 16px 80px; }

  h1 { font-family: 'Dancing Script', cursive; font-weight: 700; font-size: 40px; margin: 0 0 2px; background: linear-gradient(90deg, #D4537E, #85B7EB); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .subtitle { color: #A6577A; font-size: 14px; margin: 0 0 20px; font-weight: 600; }

  .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 18px; }
  .players-btn { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px; border: 1px solid var(--glass-border); background: var(--glass-bg); backdrop-filter: blur(8px); font-size: 13px; font-weight: 600; color: var(--text-main); cursor: pointer; }
  .players-btn:hover { background: rgba(255,255,255,0.5); }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; text-align: center; padding: 10px; border-radius: 14px; cursor: pointer; border: 1px solid var(--glass-border); background: var(--glass-bg); font-weight: 600; font-size: 14px; transition: all 0.15s ease; }
  .tab.active { background: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.7); }

  .player-chip { flex: 1; padding: 12px 14px; border-radius: 14px; backdrop-filter: blur(10px); }
  .player-chip.p1 { background: rgba(133,183,235,0.22); border: 1px solid rgba(133,183,235,0.4); }
  .player-chip.p2 { background: rgba(237,147,177,0.22); border: 1px solid rgba(237,147,177,0.4); }
  .player-chip .label { font-size: 11px; margin: 0 0 2px; opacity: 0.85; }
  .player-chip.p1 .label, .player-chip.p1 .name { color: var(--blue-800); }
  .player-chip.p2 .label, .player-chip.p2 .name { color: var(--pink-800); }
  .player-chip .name { font-size: 14px; font-weight: 700; margin: 0; }
  .players-row { display: flex; gap: 10px; margin-bottom: 16px; }

  .headline { padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .headline .emoji { font-size: 26px; }
  .headline p { margin: 0; font-size: 14px; font-weight: 600; }
  .headline .sub { font-size: 12px; font-weight: 400; color: var(--text-soft); margin-top: 1px; }

  .palier { margin-bottom: 12px; overflow: hidden; transition: all 0.25s ease; }
  .palier-inner { padding: 18px 18px 14px; }
  .palier.collapsed .palier-inner { padding: 12px 18px; }
  .palier.collapsed .task-list, .palier.collapsed .progress-bar, .palier.collapsed .palier-zones, .palier.collapsed .tips { display: none; }
  .palier.locked { opacity: 0.45; }
  .palier.active { border: 1.5px solid rgba(255,255,255,0.75); background: rgba(255,255,255,0.42); }

  .palier-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; margin-bottom: 4px; }
  .palier-head-left { display: flex; align-items: center; gap: 8px; }
  .palier-title { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 17px; margin: 0; } .palier-title::before { content: '✧ '; color: #D4537E; }
  .active-tag { font-size: 10px; font-weight: 700; background: linear-gradient(90deg,#E7A9E0,#F7B3CE); color: #4B1528; padding: 2px 8px; border-radius: 999px; }
  .palier-count { font-size: 12px; color: var(--text-soft); white-space: nowrap; }
  .chevron { font-size: 12px; color: var(--text-soft); transition: transform 0.2s ease; }
  .palier.collapsed .chevron { transform: rotate(-90deg); }

  .palier-zones { font-size: 12.5px; color: var(--text-soft); margin: 2px 0 12px; line-height: 1.5; }
  .progress-bar { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.4); overflow: hidden; margin-bottom: 14px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #E7A9E0, #F7B3CE, #FFC9DD); border-radius: 999px; transition: width 0.3s ease; }

  .tips { margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
  .tip { display: flex; gap: 8px; font-size: 12.5px; color: #993556; background: rgba(247,179,206,0.25); border: 1px solid rgba(247,179,206,0.5); border-radius: 12px; padding: 9px 12px; line-height: 1.45; }
  .tip .ico { flex-shrink: 0; }

  .task-list { display: flex; flex-direction: column; gap: 7px; }
  .task { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border-radius: 14px; background: rgba(255,255,255,0.3); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.4); transition: background 0.2s ease; }
  .task.highlight { background: rgba(255,255,255,0.48); border: 1.5px solid rgba(255,255,255,0.65); }
  .task.both-done { background: rgba(160, 220, 180, 0.28); border-color: rgba(160,220,180,0.5); }
  .task-name { flex: 1; font-size: 13.5px; }
  .task-name a { color: var(--text-main); text-decoration: none; }
  .task-name a:hover { text-decoration: underline; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 999px; margin-left: 6px; font-weight: 700; vertical-align: middle; }
  .badge.tdm { background: rgba(133,183,235,0.4); color: var(--blue-900); }
  .badge.tornade { background: rgba(237,147,177,0.4); color: var(--pink-900); }

  .check-btn { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 14px; font-weight: 700; transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), background 0.15s ease; border: 1px solid; background: rgba(255,255,255,0.15); }
  .check-btn.p1 { border-color: rgba(133,183,235,0.6); color: transparent; }
  .check-btn.p1.done { background: rgba(133,183,235,0.65); color: var(--blue-900); }
  .check-btn.p2 { border-color: rgba(237,147,177,0.6); color: transparent; }
  .check-btn.p2.done { background: rgba(237,147,177,0.65); color: var(--pink-900); }
  .check-btn:hover { filter: brightness(1.05); }
  .check-btn.pop { animation: pop 0.35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { 0% { transform: scale(1); } 45% { transform: scale(1.35); } 100% { transform: scale(1); } }

  .legend { font-size: 11.5px; color: var(--text-soft); margin-top: 4px; }

  .class-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .class-card { padding: 14px 16px; }
  .class-card .cname { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 15px; margin: 0 0 2px; }
  .class-card .crole { font-size: 11.5px; color: var(--pink-800); font-weight: 700; margin: 0 0 6px; }
  .class-card .cdesc { font-size: 12.5px; color: var(--text-soft); margin: 0; line-height: 1.5; }

  .duo-card { padding: 14px 16px; margin-bottom: 10px; }
  .duo-title { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 15px; margin: 0 0 4px; }
  .duo-classes { display: flex; gap: 8px; margin-bottom: 6px; }
  .duo-pill { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; background: rgba(255,255,255,0.5); }
  .duo-why { font-size: 12.5px; color: var(--text-soft); line-height: 1.5; margin: 0; }

  .section-title { font-family: 'Dancing Script', cursive; font-weight: 700; font-size: 26px; margin: 24px 0 8px; color: #993556; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(30,30,40,0.25); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .modal { width: 100%; max-width: 360px; padding: 22px; background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); }
  .modal h3 { font-family: 'Quicksand', sans-serif; margin: 0 0 14px; font-size: 17px; }
  .modal label { font-size: 12.5px; color: var(--text-soft); display: block; margin: 10px 0 4px; }
  .modal input { width: 100%; padding: 9px 12px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.7); font-size: 14px; font-family: inherit; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: 700; font-size: 13.5px; cursor: pointer; font-family: inherit; }
  .btn-save { background: linear-gradient(90deg, #85B7EB, #ED93B1); color: white; }
  .btn-cancel { background: rgba(0,0,0,0.06); color: var(--text-main); }

  .loading { text-align: center; padding: 40px; color: var(--text-soft); font-size: 14px; }
  .sync-note { font-size: 11px; color: var(--text-soft); text-align: center; margin-top: 30px; opacity: 0.7; }
</style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="wrap">
  <h1>Roadmap Dofus</h1>
  <p class="subtitle">Session en duo — pas de rush, on avance à notre rythme</p>

  <div class="topbar">
    <button class="players-btn" id="openSettings">⚙ Noms des joueurs</button>
    <span id="syncStatus" style="font-size:11px;color:var(--text-soft);"></span>
  </div>

  <div class="players-row">
    <div class="player-chip p1"><p class="label">Joueur 1</p><p class="name" id="p1NameDisplay">Joueur 1</p></div>
    <div class="player-chip p2"><p class="label">Joueur 2</p><p class="name" id="p2NameDisplay">Joueur 2</p></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="roadmap">Roadmap</div>
    <div class="tab" data-tab="classes">Classes</div>
  </div>

  <div id="headlineBox" class="glass headline" style="display:none;">
    <span class="emoji" id="headlineEmoji">🎯</span>
    <div><p id="headlineText"></p><p class="sub" id="headlineSub"></p></div>
  </div>

  <div id="roadmapTab"><div class="loading">Chargement…</div></div>
  <div id="classesTab" style="display:none;"></div>

  <p class="sync-note">Progression synchronisée pour vous deux via Supabase.</p>
</div>

<div class="modal-overlay" id="settingsModal" style="display:none;">
  <div class="glass modal">
    <h3>Noms des joueurs</h3>
    <label for="p1Input">Joueur 1 (bleu)</label>
    <input type="text" id="p1Input" placeholder="Ex. Sylvain">
    <label for="p2Input">Joueur 2 (rose)</label>
    <input type="text" id="p2Input" placeholder="Ex. prénom ou pseudo">
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelSettings">Annuler</button>
      <button class="btn-save" id="saveSettings">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const ROADMAP = [{"id": "p1", "title": "Pr\u00e9ambule", "zones": ["Pr\u00e9ambule", "Appr\u00e9hender le jeu", "Choisir son serveur", "Choix de la classe"], "tasks": [], "tips": []}, {"id": "p2", "title": "Niveau 1 \u00e0 20", "zones": ["Incarnam : Premiers m\u00e9canismes et premiers niveaux"], "tasks": [{"id": "t1", "name": "En Route pour l'Aventure", "link": "https://www.dofuspourlesnoobs.com/en-route-pour-laventure.html", "tdm": true, "tornade": true}, {"id": "t2", "name": "Pouss\u00e9 par le vent", "link": "https://www.dofuspourlesnoobs.com/pousseacute-par-le-vent.html", "tdm": false, "tornade": false}, {"id": "t3", "name": "Service dans la milice", "link": "https://www.dofuspourlesnoobs.com/service-dans-la-milice.html", "tdm": false, "tornade": false}, {"id": "t4", "name": "C'est le m\u00e9tier qui rentre", "link": "https://www.dofuspourlesnoobs.com/cest-le-meacutetier-qui-rentre.html", "tdm": false, "tornade": false}, {"id": "t5", "name": "Ramdam sur Incarnam", "link": "https://www.dofuspourlesnoobs.com/ramdam-sur-incarnam.html", "tdm": false, "tornade": false}], "tips": ["Le Tutoriel de Dofus  Prenez le temps d'apprendre les bases du jeu : Combat, Qu\u00eate, Succ\u00e8s, M\u00e9tiers en r\u00e9alisant ces quelques succ\u00e8s et familiarisez vous avec votre premi\u00e8re Panoplie."]}, {"id": "p3", "title": "Niveau 20 \u00e0 40", "zones": ["Astrub : Introduction au background et avanc\u00e9e du personnage", "A travers le Krosmoz", "Faire le K\u00e9k\u00e9"], "tasks": [{"id": "t6", "name": "Un Citoyen Mod\u00e8le", "link": "https://www.dofuspourlesnoobs.com/un-citoyen-modele.html", "tdm": true, "tornade": true}, {"id": "t7", "name": "L'occasion fait le larron", "link": "https://www.dofuspourlesnoobs.com/l-occasion-fait-le-larron.html", "tdm": false, "tornade": false}, {"id": "t8", "name": "La grande biblioqu\u00e8te", "link": "https://www.dofuspourlesnoobs.com/la-grande-biblioquete.html", "tdm": false, "tornade": false}, {"id": "t9", "name": "Mercenaire d'acier", "link": "https://www.dofuspourlesnoobs.com/mercenaire-d-acier.html", "tdm": false, "tornade": false}, {"id": "t10", "name": "Pas le temps de ch\u00f4mer", "link": "https://www.dofuspourlesnoobs.com/pas-le-temps-de-chomer.html", "tdm": false, "tornade": false}, {"id": "t11", "name": "L'Habitat urbain", "link": "https://www.dofuspourlesnoobs.com/l-habitat-urbain.html", "tdm": true, "tornade": true}, {"id": "t12", "name": "Escapades et Embuscades", "link": "https://www.dofuspourlesnoobs.com/escapades-et-embuscades.html", "tdm": false, "tornade": false}, {"id": "t13", "name": "Grange du Tournesol Affam\u00e9 & Cour du Bouftou Royal (Tour du Monde)", "link": "https://www.dofuspourlesnoobs.com/le-tour-du-monde-en-27-donjons.html", "tdm": true, "tornade": false}, {"id": "t14", "name": "Ch\u00e2teau Ensabl\u00e9 & Cache du Kankreblath (Tornade des Donjons)", "link": "https://www.dofuspourlesnoobs.com/premiegravere-eacutedition-de-donjons.html", "tdm": false, "tornade": true}, {"id": "t15", "name": "L'osmose", "link": "https://www.dofuspourlesnoobs.com/losmose.html", "tdm": true, "tornade": true}, {"id": "t16", "name": "Faire le k\u00e9k\u00e9", "link": "https://www.dofuspourlesnoobs.com/faire-le-keke.html", "tdm": true, "tornade": true}], "tips": ["Seconde partie du Tutoriel avec une course effr\u00e9n\u00e9e \u00e0 travers la cit\u00e9 d'Astrub.", "Plusieurs zones offrent des primes \u00e0 l'affrontement de certains monstres sp\u00e9ciaux. Il est n\u00e9cessaire d'initier une qu\u00eate \"\u00c0 la recherche de <X>\" dans les b\u00e2timents de type \"Milice\" de diff\u00e9rentes cit\u00e9s (Astrub, Chateau d'Amakna, Frigost, etc...) Pensez \u00e0 les prendre d\u00e8s que vous croisez un de ces b\u00e2timents !", "Lancer Du Rire en Barre au temple de l'Almanax et la compl\u00e9ter au fil de votre aventure. L'Ocre d'Ambre est une qu\u00eate principale n\u00e9cessaire pour la fin de la s\u00e9rie des Dofus Primordiaux.", "La diligence d'Astrub vous offre une t\u00e9l\u0 let state = { players: { p1: "Joueur 1", p2: "Joueur 2" }, progress: {} };
let manualOverride = {}; // paliers ouverts/fermés manuellement par l'utilisateur

function taskDone(taskId, player) { return !!(state.progress[taskId] && state.progress[taskId][player]); }

function palierStats(palier) {
  const total = palier.tasks.length * 2;
  let done = 0;
  palier.tasks.forEach(t => { if (taskDone(t.id, 'p1')) done++; if (taskDone(t.id, 'p2')) done++; });
  return { total, done, pct: total ? Math.round((done / total) * 100) : 0, complete: total > 0 && done === total };
}

function getActivePalierIndex() {
  for (let i = 0; i < ROADMAP.length; i++) {
    if (ROADMAP[i].tasks.length === 0) continue;
    if (!palierStats(ROADMAP[i]).complete) return i;
  }
  return ROADMAP.length - 1;
}

async function loadState() {
  if (!sbClient) {
    const local = localStorage.getItem('dofus_roadmap_state');
    if (local) state = JSON.parse(local);
    render();
    return;
  }
  document.getElementById('syncStatus').textContent = 'Synchronisation…';
  const { data: players } = await sbClient.from('players').select('*');
  if (players) players.forEach(p => { state.players[p.slot] = p.name; });
  const { data: progress } = await sbClient.from('progress').select('*');
  if (progress) progress.forEach(row => {
    if (!state.progress[row.task_id]) state.progress[row.task_id] = {};
    state.progress[row.task_id][row.player] = row.done;
  });
  document.getElementById('syncStatus').textContent = '';
  render();
}

async function saveProgress(taskId, player, done) {
  if (!state.progress[taskId]) state.progress[taskId] = {};
  state.progress[taskId][player] = done;
  render();
  if (sbClient) {
    await sbClient.from('progress').upsert({ task_id: taskId, player: player, done: done }, { onConflict: 'task_id,player' });
  } else {
    localStorage.setItem('dofus_roadmap_state', JSON.stringify(state));
  }
}

async function savePlayers(p1, p2) {
  state.players.p1 = p1 || "Joueur 1";
  state.players.p2 = p2 || "Joueur 2";
  render();
  if (sbClient) {
    await sbClient.from('players').upsert([{ slot: 'p1', name: state.players.p1 }, { slot: 'p2', name: state.players.p2 }], { onConflict: 'slot' });
  } else {
    localStorage.setItem('dofus_roadmap_state', JSON.stringify(state));
  }
}

function renderHeadline(activeIdx) {
  const box = document.getElementById('headlineBox');
  const palier = ROADMAP[activeIdx];
  if (!palier || palier.tasks.length === 0) { box.style.display = 'none'; return; }
  const stats = palierStats(palier);
  const remaining = palier.tasks.length - Math.min(
    palier.tasks.filter(t => taskDone(t.id,'p1')).length,
    palier.tasks.filter(t => taskDone(t.id,'p2')).length
  );
  box.style.display = 'flex';
  document.getElementById('headlineEmoji').textContent = stats.pct === 0 ? '🌸' : (stats.pct < 100 ? '💕' : '🎀');
  document.getElementById('headlineText').textContent = `Vous êtes sur : ${palier.title}`;
  document.getElementById('headlineSub').textContent = remaining > 0
    ? `${remaining} tâche${remaining>1?'s':''} restante${remaining>1?'s':''} avant le palier suivant`
    : `Tout le monde a fini ce palier, bravo !`;
}

function renderRoadmap() {
  const container = document.getElementById('roadmapTab');
  const activeIdx = getActivePalierIndex();
  renderHeadline(activeIdx);
  let html = '';

  ROADMAP.forEach((palier, idx) => {
    if (palier.tasks.length === 0) {
      html += `<div class="glass palier"><div class="palier-inner"><p class="palier-title">${palier.title}</p></div></div>`;
      return;
    }
    const stats = palierStats(palier);
    const isActive = idx === activeIdx;
    const isLocked = idx > activeIdx;
    const isCollapsed = manualOverride.hasOwnProperty(palier.id) ? manualOverride[palier.id] : (idx !== activeIdx);
    const showTips = idx < TIPS_PALIER_LIMIT && palier.tips && palier.tips.length;

    let classes = 'glass palier';
    if (isActive) classes += ' active';
    if (isLocked) classes += ' locked';
    if (isCollapsed) classes += ' collapsed';

    html += `<div class="${classes}" data-palier="${palier.id}">
      <div class="palier-inner">
        <div class="palier-head" data-toggle="${palier.id}">
          <div class="palier-head-left">
            <p class="palier-title">${palier.title}</p>
            ${isActive ? '<span class="active-tag">✨ En cours</span>' : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="palier-count">${stats.done}/${stats.total}</span>
            <span class="chevron">▾</span>
          </div>
        </div>`;
    if (palier.zones.length) html += `<p class="palier-zones">${palier.zones.join(' → ')}</p>`;
    html += `<div class="progress-bar"><div class="progress-fill" style="width:${stats.pct}%"></div></div>`;

    if (showTips) {
      html += `<div class="tips">`;
      palier.tips.forEach(tip => {
        html += `<div class="tip"><span class="ico">🎀</span><span>${tip}</span></div>`;
      });
      html += `</div>`;
    }

    html += `<div class="task-list">`;
    palier.tasks.forEach(t => {
      const isHighlight = t.tdm || t.tornade;
      const p1done = taskDone(t.id, 'p1');
      const p2done = taskDone(t.id, 'p2');
      const bothDone = p1done && p2done;
      const nameHtml = t.link ? `<a href="${t.link}" target="_blank" rel="noopener">${t.name}</a>` : t.name;
      let badges = '';
      if (t.tdm) badges += `<span class="badge tdm">TDM</span>`;
      if (t.tornade) badges += `<span class="badge tornade">Tornade</span>`;
      html += `<div class="task ${isHighlight ? 'highlight' : ''} ${bothDone ? 'both-done' : ''}">
        <div class="task-name">${nameHtml}${badges}</div>
        <div class="check-btn p1 ${p1done ? 'done' : ''}" data-task="${t.id}" data-player="p1" title="${state.players.p1}">♥</div>
        <div class="check-btn p2 ${p2done ? 'done' : ''}" data-task="${t.id}" data-player="p2" title="${state.players.p2}">♥</div>
      </div>`;
    });
    html += `</div></div></div>`;
  });

  html += `<p class="legend">TDM = Tour du Monde · Tornade = Tornade des Donjons — fils rouges de la progression</p>`;
  container.innerHTML = html;

  container.querySelectorAll('.check-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const taskId = btn.dataset.task;
      const player = btn.dataset.player;
      const current = taskDone(taskId, player);
      btn.classList.add('pop');
      saveProgress(taskId, player, !current);
    });
  });
  container.querySelectorAll('.palier-head').forEach(head => {
    head.addEventListener('click', () => {
      const pid = head.dataset.toggle;
      const wasCollapsed = manualOverride.hasOwnProperty(pid) ? manualOverride[pid] : (pid !== ROADMAP[activeIdx].id);
      manualOverride[pid] = !wasCollapsed;
      renderRoadmap();
    });
  });
}

function renderClasses() {
  const container = document.getElementById('classesTab');
  let html = `<p class="section-title">Duos complémentaires suggérés</p>`;
  CLASSDATA.duos.forEach(d => {
    html += `<div class="glass duo-card"><p class="duo-title">${d.title}</p><div class="duo-classes">${d.classes.map(c => `<span class="duo-pill">${c}</span>`).join('')}</div><p class="duo-why">${d.why}</p></div>`;
  });
  html += `<p class="section-title">Les 19 classes</p><div class="class-grid">`;
  CLASSDATA.classes.forEach(c => {
    html += `<div class="glass class-card"><p class="cname">${c.name}</p><p class="crole">${c.role}</p><p class="cdesc">${c.desc}</p></div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

function render() {
  document.getElementById('p1NameDisplay').textContent = state.players.p1;
  document.getElementById('p2NameDisplay').textContent = state.players.p2;
  renderRoadmap();
  renderClasses();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('roadmapTab').style.display = target === 'roadmap' ? 'block' : 'none';
    document.getElementById('classesTab').style.display = target === 'classes' ? 'block' : 'none';
    document.getElementById('headlineBox').style.display = target === 'roadmap' ? 'flex' : 'none';
  });
});

document.getElementById('openSettings').addEventListener('click', () => {
  document.getElementById('p1Input').value = state.players.p1;
  document.getElementById('p2Input').value = state.players.p2;
  document.getElementById('settingsModal').style.display = 'flex';
});
document.getElementById('cancelSettings').addEventListener('click', () => {
  document.getElementById('settingsModal').style.display = 'none';
});
document.getElementById('saveSettings').addEventListener('click', () => {
  const p1 = document.getElementById('p1Input').value.trim();
  const p2 = document.getElementById('p2Input').value.trim();
  savePlayers(p1, p2);
  document.getElementById('settingsModal').style.display = 'none';
});

loadState();
</script>
</body>
</html>
